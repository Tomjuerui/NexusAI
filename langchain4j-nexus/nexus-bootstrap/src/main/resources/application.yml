server:
  port: 9999
  context-path: /
  servlet:
    session:
      timeout: 28800s
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: Nexus
  profiles:
    active: dev
  mvc:
    async:
      request-timeout: 180000
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    time-zone: "GMT+8"
    serialization: { write-dates-as-timestamps: false }
  cache:
    type: redis
    redis:
      key-prefix: 'AUTO_CACHE\:'
      time-to-live: 1h
  mail:
    default-encoding: UTF-8
    protocol: smtps
    host: your-email-host  # smtp.exmail.qq.com
    username: your-email-username # xxx@qq.com
    password: your-email-password
    port: 465
    properties:
      mail:
        smtp:
          ssl:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

mybatis-plus:
  # 支持统配�?* 或�?; 分割
  mapper-locations: classpath*:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    name: /data/Nexus/logs/app.log

nexus:
  host: Nexus.com
  frontend-url: http://www.${nexus.host}
  backend-url: http://www.${nexus.host}/api
  proxy:
    enable: false
    host: 127.0.0.1
    http-port: 1087
  encrypt:
    # 数据库敏感字段加密的密钥，不要泄�?
    # 项目首次编译时改成自己的密钥(长度�?6的字符串�? Ap9da0CopbjiKGc1)
    aes-key: ${NEXUS_ENCRYPT_AES_KEY:Ap9da0CopbjiKGc1}

local:
  files: /data/Nexus/files/
  images: /data/Nexus/images/
  watermark-images: /data/Nexus/mark-images/
  thumbnails: /data/Nexus/thumbnails/
  watermark-thumbnails: /data/Nexus/watermark-thumbnails/
  tmp-images: /data/Nexus/tmp-images/
  chat-memory: /data/Nexus/chat-memory/