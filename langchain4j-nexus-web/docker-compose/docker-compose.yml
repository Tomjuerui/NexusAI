version: '3'

services:
  Nexus-web:
    container_name: Nexus-web
    image: Nexus-web
    build:
      context: ../              #иЎЁзӨәdockerfileж–Үд»¶еӯҳеңЁзҡ„зӣ®еҪ?
      dockerfile: dockerfile    #иЎЁзӨәdockerfileзҡ„ж–Үд»¶еҗҚ
    ports:
      - 1002:1002
  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - '80:80'
    expose:
      - '80'
    volumes:
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
